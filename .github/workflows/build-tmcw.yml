name: Build TMCW
on: workflow_dispatch

env:
  VERSION_NAME: TMCWv5.10
 
jobs:
  build-tmcw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download and extract files
        run: |
          curl -L \
            -o "$VERSION_NAME.zip" "https://www.dropbox.com/scl/fi/tssvedc0xhb6dk6anap41/TMCWv5.10.zip?rlkey=rf98ln8zcmn52kttvv7mb1umg&dl=1" \
            -o "$VERSION_NAME.jar" "https://launcher.mojang.com/v1/objects/1703704407101cf72bd88e68579e3696ce733ecd/client.jar"

          unzip *.zip

      - name: Patch JAR
        run: |
          zip -d *.jar "META-INF/*"
          (cd Mod && zip -ur *.jar .)

      - name: Stage output
        run: zip TMCW.zip *.jar *.json

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: outputs
          files: TMCW.zip
