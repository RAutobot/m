name: Clear Runs
on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: Repository name
        default: aliucord-plugins
        required: true
      workflow_name:
        description: Workflow name

jobs:
  clear-runs:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT }}
      REPOSITORY_NAME: ${{ inputs.repository_name }}
      WORKFLOW_NAME: ${{ inputs.workflow_name }}
    steps:
      - name: Run
        run: |
          gh api --paginate --jq ".workflow_runs[].id" "/repos/${{ github.repository_owner }}/$REPOSITORY_NAME/actions/${{ env.WORKFLOW_NAME && format('workflows/{0}/', env.WORKFLOW_NAME) || '' }}runs?status=completed" \
            | xargs -r -I {} gh run delete --repo "${{ github.repository_owner }}/$REPOSITORY_NAME" {}
