name: Dex to Java
on:
  workflow_dispatch:
    inputs:
      file_url:
        description: File URL
        required: true

jobs:
  dex-to-java:
    runs-on: ubuntu-latest
    env:
      FILE_URL: ${{ inputs.file_url }}
    steps:
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Download JADX
        uses: dawidd6/action-download-artifact@v20
        with:
          repo: skylot/jadx
          branch: master
          workflow: build-artifacts.yml
          name: (?<!win)$
          name_is_regexp: true

      - name: Download file
        run: |
          filename="$(curl -LOJ -w "%{filename_effective}" "$FILE_URL")"
          printf "%s\n" "INPUT_FILENAME=$filename" >> "$GITHUB_ENV"

      - name: Dex to Java
        run: |
          ./*/bin/jadx \
            --export-gradle \
            --show-bad-code \
            --fs-case-sensitive \
            --respect-bytecode-access-modifiers \
            --no-inline-anonymous \
            --no-inline-kotlin-lambda \
            --no-inline-methods \
            --no-move-inner-classes \
            --output-dir output \
            "$INPUT_FILENAME" || true

      - name: Remove metadata annotations
        run: find . -type f -name "*.java" -exec sed -i "/@kotlin.Metadata(/d; /@Metadata(/d; /import kotlin.Metadata/d" {} +

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: output
          path: output
