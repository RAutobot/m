name: Compress Videos
run-name: Compress Videos (${{ inputs.video_scale }})
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: JSON array of video URL
        default: '["URL_HERE"]'
        required: true
      video_scale:
        description: Video scale
        default: "144"
        type: choice
        options:
          - -2
          - 1080
          - 720
          - 480
          - 360
          - 240
          - 144

jobs:
  compress-videos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        video_url: ${{ fromJson(inputs.video_urls) }}
      fail-fast: false
    env:
      VIDEO_SCALE: ${{ inputs.video_scale }}
    steps:
      - name: Download video
        run: |
          filename="$(curl -LOJ -w "%{filename_effective}" "${{ matrix.video_url }}")"
          printf "%s\n" "INPUT_FILENAME=$filename" "OUTPUT_FILEPATH=$RUNNER_TEMP/${filename%.*}.mkv" >> "$GITHUB_ENV"

      - name: Install FFmpeg
        run: curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" | tar -xJ -f - --occurrence --wildcards "*/bin/ffmpeg"

      - name: Compress video
        run: |
          ./*/bin/ffmpeg \
            -i "$INPUT_FILENAME" \
            -c:v libx265 \
            -crf 30 \
            -vf "scale='if(gt(iw,ih),-2,$VIDEO_SCALE)':'if(gt(iw,ih),$VIDEO_SCALE,-2)'" \
            -pix_fmt yuv420p10le \
            -preset slow \
            -c:a libopus \
            -b:a 64k \
            "$OUTPUT_FILEPATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ${{ env.OUTPUT_FILEPATH }}
