name: JADX

on:
  workflow_dispatch:
    inputs:
      file_link:
        description: File link
        required: true

jobs:
  jadx:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Set up JADX
        uses: dawidd6/action-download-artifact@v20
        with:
          repo: skylot/jadx
          branch: master
          workflow: build-artifacts.yml
          name: (?<!win)$
          name_is_regexp: true

      - name: Download input file
        run: printf "INPUT_FILENAME=$(curl -LOJ -w %{filename_effective} "${{ inputs.file_link }}")" >> "$GITHUB_ENV"

      - name: Decompile input file
        run: |
          sh */bin/jadx \
            --fs-case-sensitive \
            --no-inline-anonymous \
            --no-inline-kotlin-lambda \
            --no-inline-methods \
            --no-move-inner-classes \
            --output-dir output \
            --respect-bytecode-access-modifiers \
            --show-bad-code \
            --export-gradle \
            "$INPUT_FILENAME" || true

      - name: Remove metadata annotations
        run: find . -type f -name "*.java" -exec sed -i "/@kotlin.Metadata(/d; /@Metadata(/d; /import kotlin.Metadata/d" {} +

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: output
          path: output
